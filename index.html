<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SalónEstudio · Koke</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#f5f5f0;min-height:100vh;color:#1a1a1a;touch-action:manipulation}
.bar{background:#fff;border-bottom:1px solid #e8e8e4;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.logo{font-size:17px;font-weight:700}
.logo span{color:#1D9E75}
.main{padding:16px;padding-bottom:120px}
.card{background:#fff;border:1px solid #e8e8e4;border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px}
.ibox{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.btn{width:100%;padding:13px;border-radius:11px;border:none;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;color:#fff}
.opt{background:#f5f5f0;border:1.5px solid #e8e8e4;border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;font-size:14px;text-align:left;width:100%}
.opt.ok{background:#EAF3DE;border-color:#639922;color:#27500A}
.opt.err{background:#FCEBEB;border-color:#E24B4A;color:#791F1F}
.fb{font-size:13px;padding:11px 14px;border-radius:10px;margin:10px 0}
.fb.ok{background:#EAF3DE;color:#27500A}
.fb.err{background:#FCEBEB;color:#791F1F}
.hint-box{background:#FFF8E7;border:1.5px solid #EF9F27;border-radius:12px;padding:14px;margin-top:8px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

/* FABs */
#fab-group{position:fixed;bottom:22px;right:18px;z-index:100;display:none;flex-direction:column;align-items:center;gap:12px}
.fab{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;border:none;box-shadow:0 4px 16px rgba(0,0,0,.22);transition:transform .15s}
.fab:active{transform:scale(.9)}
#fab-asist{background:linear-gradient(135deg,#1D9E75,#0a5c44);box-shadow:0 4px 18px rgba(29,158,117,.45);animation:pulse 3s ease-in-out infinite}
#fab-pizarra{background:linear-gradient(135deg,#2a2a6e,#0f3460);box-shadow:0 4px 16px rgba(15,52,96,.5)}

/* Asistente */
#asist-overlay{position:fixed;inset:0;z-index:199;background:rgba(0,0,0,.28);display:none}
#asist-overlay.open{display:block}
#asist-drawer{position:fixed;bottom:0;left:0;right:0;z-index:200;background:#fff;border-radius:22px 22px 0 0;box-shadow:0 -6px 32px rgba(0,0,0,.15);display:none;flex-direction:column;max-height:72vh;animation:fadeUp .22s ease}
#asist-drawer.open{display:flex}
#asist-handle{width:40px;height:4px;border-radius:2px;background:#e0e0e0;margin:10px auto 0;flex-shrink:0;cursor:pointer}
#asist-head{padding:10px 16px 8px;display:flex;align-items:center;gap:10px;flex-shrink:0;border-bottom:1px solid #f0f0f0}
#asist-msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
#asist-input-row{padding:10px 14px;border-top:1px solid #f0f0f0;display:flex;gap:8px;flex-shrink:0}
#asist-input{flex:1;padding:10px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;font-family:inherit;outline:none}
#asist-send{padding:10px 16px;border-radius:10px;border:none;background:#1D9E75;color:#fff;font-size:15px;font-weight:700;cursor:pointer}

/* Pizarra modal */
#pz-modal{position:fixed;inset:0;z-index:300;display:none;flex-direction:column;background:#12122a}
#pz-modal.open{display:flex}
#pizarra-bar{background:#16213e;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid #0f3460}
#pizarra-canvas{flex:1;display:block;touch-action:none;cursor:crosshair}
#pizarra-toolbar{background:#16213e;border-top:1px solid #0f3460;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#pizarra-toolbar::-webkit-scrollbar{display:none}
.pz-btn{border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;padding:7px 13px}
.color-dot{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;flex-shrink:0;transition:transform .15s}
.color-dot.active{border-color:#fff;transform:scale(1.22)}
.size-btn{width:36px;height:36px;border-radius:50%;background:#1e1e3a;border:2px solid #333;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.size-btn.active{border-color:#1D9E75}
.pz-sep{width:1px;height:28px;background:#333;flex-shrink:0}
</style>
</head>
<body>

<div id="app"></div>

<!-- FABs -->
<div id="fab-group">
  <button class="fab" id="fab-pizarra" onclick="openPzModal()" title="Pizarra">🖊️</button>
  <button class="fab" id="fab-asist"   onclick="openAsist()"   title="Asistente">🤖</button>
</div>

<!-- Asistente -->
<div id="asist-overlay" onclick="closeAsist()"></div>
<div id="asist-drawer">
  <div id="asist-handle" onclick="closeAsist()"></div>
  <div id="asist-head">
    <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#1D9E75,#0a5c44);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🤖</div>
    <div>
      <div style="font-size:14px;font-weight:700">Asistente IA</div>
      <div style="font-size:11px;color:#888" id="asist-ctx-label">Consulta sobre el ejercicio</div>
    </div>
    <button onclick="closeAsist()" style="margin-left:auto;background:none;border:none;font-size:22px;color:#bbb;cursor:pointer;padding:4px">×</button>
  </div>
  <div id="asist-msgs"></div>
  <div id="asist-input-row">
    <input id="asist-input" placeholder="¿Qué no entendiste?" />
    <button id="asist-send" onclick="sendAsist()">→</button>
  </div>
</div>

<!-- Pizarra modal -->
<div id="pz-modal">
  <div id="pizarra-bar">
    <span onclick="closePzModal()" style="color:#8899bb;font-size:14px;cursor:pointer;padding:5px 10px;border-radius:8px;background:#0f1f3d;font-weight:600">&#8249; Volver</span>
    <span style="font-size:14px;font-weight:700;color:#fff">🖊️ Pizarra</span>
    <button class="pz-btn" onclick="pzClear()" style="background:#3a1a1a;color:#E24B4A;border:1.5px solid #E24B4A">🗑 Limpiar</button>
  </div>
  <canvas id="pizarra-canvas"></canvas>
  <div id="pizarra-toolbar"></div>
</div>

<script>
// ── PROXY URL ─────────────────────────────────────────────
const PROXY_URL = 'https://salon2.j-quevedo-luengo.workers.dev';

// ── DATOS ─────────────────────────────────────────────────
const RAMOS=[
  {id:'mat', n:'Matemáticas I',     e:'📐',c:'#FAEEDA',ct:'#633806',cb:'#EF9F27'},
  {id:'eco', n:'Fund. de Economía', e:'📈',c:'#E1F5EE',ct:'#0F6E56',cb:'#1D9E75'},
  {id:'adm', n:'Adm. de Empresas',  e:'🏢',c:'#E6F1FB',ct:'#0C447C',cb:'#378ADD'},
  {id:'cont',n:'Contabilidad I',    e:'📒',c:'#EEEDFE',ct:'#3C3489',cb:'#7F77DD'},
];
const TEMAS={
  mat: ['Conjuntos y Venn','Expresiones Algebraicas','Ecuaciones Lineales','Sistemas 2x2','Sucesiones','Inducción Matemática'],
  eco: ['10 Principios Mankiw','FPP y modelos','Ventaja Comparativa','Oferta y Demanda','Elasticidad','Políticas del Gobierno'],
  adm: ['Historia y Enfoques','Planeación','Organización','Dirección y Liderazgo','Porter y FODA'],
  cont:['Conceptos Fundamentales','Asientos Contables','IVA y PPM','FIFO y PPP','Libro Mayor y Balance'],
};
const CTX={
  mat:'Matemáticas I Ingeniería Comercial UNAB. Conjuntos (unión, intersección, complemento, cardinalidad, Venn), factorización (cuadrado binomio, diferencia cuadrados, cubos, trinomios), ecuaciones lineales y cuadráticas (fórmula general), sistemas 2x2 (sustitución, eliminación), sucesiones (Σk=n(n+1)/2, Σk²=n(n+1)(2n+1)/6), inducción matemática.',
  eco:'Economía UNAB. Mankiw 7ma Cap 1-6: 10 principios, FPP, economía positiva/normativa, ceteris paribus, ventaja comparativa/absoluta, ley demanda/oferta, desplazamientos, equilibrio, elasticidades, precio máximo/mínimo, impuestos, peso muerto.',
  adm:'Administración UNAB. Taylor, Fayol (14 principios, 5 funciones), Hawthorne, sinergia, planeación estratégica/táctica/operativa, misión/visión/FODA, organigramas, unidad de mando, centralización, 3 liderazgos, comunicación, 5 Fuerzas Porter.',
  cont:'Contabilidad I UNAB. Ecuación A=P+Patrimonio, partida doble (DEBE=activos/gastos, HABER=pasivos/patrimonio/ingresos), libro diario/mayor, IVA 19%, PPM, FIFO, PPP, balance 8 columnas.',
};

// ── STATE ─────────────────────────────────────────────────
let xp=0,streak=0,totalQ=0,correct=0,errors=[];
let chatHistory=[], asistHistory=[];
let screen='home', prevScr='home';
let curRamo=null, curTema=null, actType='quiz';
let q=null, loading=false, answered=false;
let sel=null, fillV='', calcV='', showH=false;
let sQ=0, sC=0;

function load(){
  try{const s=JSON.parse(localStorage.getItem('sx')||'{}');
    xp=s.xp||0;streak=s.streak||0;totalQ=s.totalQ||0;
    correct=s.correct||0;errors=s.errors||[];chatHistory=s.ch||[];
  }catch(e){}
}
function save(){
  try{localStorage.setItem('sx',JSON.stringify({xp,streak,totalQ,correct,errors,ch:chatHistory}));}catch(e){}
}

// ── API ───────────────────────────────────────────────────
async function claude(prompt, max){
  const r = await fetch(PROXY_URL, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: max || 800,
      messages: [{role:'user', content:prompt}]
    })
  });
  if(!r.ok) throw new Error('HTTP '+r.status);
  const d = await r.json();
  if(d.error) throw new Error(d.error.message||'API error');
  return d.content?.map(c=>c.text||'').join('')||'';
}

async function genQ(rid, tema, type){
  const ctx = CTX[rid];
  const p = {
    quiz:      `${ctx}\nGenera UNA pregunta múltiple choice sobre "${tema}". SOLO JSON sin backticks:\n{"question":"...","options":["A","B","C","D"],"correct":0,"hint":"explicación","explanation":"concepto clave"}`,
    calculo:   `${ctx}\nGenera UN ejercicio de cálculo sobre "${tema}". SOLO JSON sin backticks:\n{"problem":"enunciado con números","answer":"respuesta exacta","hint":"pasos","explanation":"fórmula clave","unit":"unidad"}`,
    completar: `${ctx}\nGenera UNA oración para completar sobre "${tema}". SOLO JSON sin backticks:\n{"before":"texto antes","blank":"respuesta","after":"texto después","hint":"explicación","explanation":"concepto"}`,
  };
  const txt = await claude(p[type]||p.quiz, 800);
  return JSON.parse(txt.replace(/```json|```/g,'').trim());
}

// ── NAV ───────────────────────────────────────────────────
function go(s){prevScr=screen;screen=s;render();}
function back(){screen=prevScr;render();}

function topBar(label, fn){
  return `<div class="bar">
    <span onclick="${fn||'back()'}" style="font-size:14px;color:#666;cursor:pointer">&#8249; ${label}</span>
    <div class="logo">Salón<span>Estudio</span></div>
    <div style="display:flex;gap:8px;font-size:13px;font-weight:700">
      <span style="color:#E24B4A">🔥${streak}</span>
      <span style="color:#BA7517">⭐${xp}</span>
    </div>
  </div>`;
}

function updateFab(){
  const fg=document.getElementById('fab-group');
  if(!fg) return;
  fg.style.display=(screen==='practice')?'flex':'none';
  if(screen!=='practice') closeAsist();
}

function render(){
  const map={home:pgHome, ramo:pgRamo, practice:pgPractice, chat:pgChat, errores:pgErrores};
  document.getElementById('app').innerHTML=(map[screen]||pgHome)();
  bindInputs();
  updateFab();
}

// ── ASISTENTE ─────────────────────────────────────────────
function openAsist(){
  const lbl=document.getElementById('asist-ctx-label');
  if(lbl&&curTema) lbl.textContent=curTema;
  document.getElementById('asist-drawer').classList.add('open');
  document.getElementById('asist-overlay').classList.add('open');
  renderAsistMsgs();
  setTimeout(()=>{
    document.getElementById('asist-input')?.focus();
    const m=document.getElementById('asist-msgs');
    if(m) m.scrollTop=m.scrollHeight;
  },80);
}
function closeAsist(){
  document.getElementById('asist-drawer').classList.remove('open');
  document.getElementById('asist-overlay').classList.remove('open');
}
function renderAsistMsgs(){
  const el=document.getElementById('asist-msgs');
  if(!el) return;
  const greeting = asistHistory.length===0
    ? `<div style="background:#f0faf6;border:1px solid #c8eadf;border-radius:12px;padding:10px 13px;font-size:13px;max-width:88%;line-height:1.55;color:#0a5c44">
        ¡Hola Koke! 👋 Estoy aquí para ayudarte con este ejercicio. ¿Qué no quedó claro?
       </div>` : '';
  el.innerHTML = greeting + asistHistory.map(m =>
    m.r==='u'
      ? `<div style="display:flex;justify-content:flex-end"><div style="background:#1D9E75;color:#fff;border-radius:14px 14px 4px 14px;padding:9px 13px;font-size:13px;max-width:82%;line-height:1.5">${m.t}</div></div>`
      : `<div style="background:#f5f5f0;border:1px solid #e8e8e4;border-radius:14px;padding:9px 13px;font-size:13px;max-width:88%;line-height:1.55">${m.t}</div>`
  ).join('');
  setTimeout(()=>{const m=document.getElementById('asist-msgs');if(m)m.scrollTop=m.scrollHeight;},40);
}
async function sendAsist(){
  const inp=document.getElementById('asist-input');
  if(!inp||!inp.value.trim()) return;
  const msg=inp.value.trim(); inp.value='';
  asistHistory=[...asistHistory,{r:'u',t:msg}];
  renderAsistMsgs();
  const qCtx = q
    ? (actType==='quiz'    ? `Pregunta: "${q.question}" | Opciones: ${(q.options||[]).join(' / ')} | Correcta: opción ${['A','B','C','D'][q.correct]}.`
      :actType==='calculo' ? `Problema: "${q.problem}" | Respuesta: ${q.answer} ${q.unit||''}.`
      :                     `Completar: "${q.before} ___ ${q.after}" | Respuesta: "${q.blank}".`)
    : 'Sin ejercicio activo.';
  const prompt=`Eres el asistente de Koke, Ing. Comercial 1er año UNAB.\nContexto ramo: ${CTX[curRamo?.id]||''}\nTema: ${curTema||''}\nEjercicio: ${qCtx}\nPregunta de Koke: "${msg}"\nResponde claro, máx 3 oraciones, motivador.`;
  try{
    asistHistory=[...asistHistory,{r:'a',t:'<span style="color:#aaa">✦ pensando...</span>'}];
    renderAsistMsgs();
    const resp=await claude(prompt,400);
    asistHistory.pop();
    asistHistory=[...asistHistory,{r:'a',t:resp}];
  }catch(e){
    asistHistory.pop();
    asistHistory=[...asistHistory,{r:'a',t:'Error al conectar 😅 Revisa tu proxy.'}];
  }
  renderAsistMsgs();
}

// ── PIZARRA ───────────────────────────────────────────────
let pzCtx=null, pzCanvas=null, pzDrawing=false;
let pzColor='#ffffff', pzSize=3, pzEraser=false;
let pzLastX=0, pzLastY=0, pzSavedImage=null;
const PZ_COLORS=['#ffffff','#1D9E75','#EF9F27','#E24B4A','#378ADD','#c084fc','#86efac','#000000'];
const PZ_SIZES=[{s:2,dot:5,label:'Fino'},{s:5,dot:9,label:'Medio'},{s:14,dot:13,label:'Grueso'}];

function openPzModal(){
  document.getElementById('pz-modal').classList.add('open');
  pzCanvas=document.getElementById('pizarra-canvas');
  pzCtx=pzCanvas.getContext('2d');
  pzRenderToolbar();
  pzInitCanvas();
  pzCanvas.addEventListener('pointerdown',pzStart,{passive:false});
  pzCanvas.addEventListener('pointermove',pzMove,{passive:false});
  pzCanvas.addEventListener('pointerup',pzEnd);
  pzCanvas.addEventListener('pointercancel',pzEnd);
  pzCanvas.addEventListener('pointerleave',pzEnd);
}
function closePzModal(){pzSave();document.getElementById('pz-modal').classList.remove('open');}
function pzRenderToolbar(){
  const tb=document.getElementById('pizarra-toolbar');
  if(!tb) return;
  tb.innerHTML=`
    <button class="pz-btn" onclick="pzToggleEraser()" style="background:${pzEraser?'#2a1f00':'#1e1e3a'};color:${pzEraser?'#EF9F27':'#aaa'};border:1.5px solid ${pzEraser?'#EF9F27':'#333'}">${pzEraser?'⬜ Borrador':'✏️ Lápiz'}</button>
    <div class="pz-sep"></div>
    ${PZ_COLORS.map(c=>`<div class="color-dot${!pzEraser&&pzColor===c?' active':''}" style="background:${c};${c==='#000000'?'border:3px solid #555':''}" onclick="pzSetColor('${c}')"></div>`).join('')}
    <div class="pz-sep"></div>
    ${PZ_SIZES.map(({s,dot,label})=>`<button class="size-btn${pzSize===s?' active':''}" onclick="pzSetSize(${s})" title="${label}"><div style="width:${dot}px;height:${dot}px;border-radius:50%;background:${pzEraser?'#666':pzColor};pointer-events:none"></div></button>`).join('')}`;
}
function pzInitCanvas(){
  if(!pzCanvas) return;
  const bar=document.getElementById('pizarra-bar');
  const tb=document.getElementById('pizarra-toolbar');
  if(!bar||!tb) return;
  const dpr=window.devicePixelRatio||1;
  const W=window.innerWidth, H=window.innerHeight-bar.offsetHeight-tb.offsetHeight;
  pzCanvas.width=Math.round(W*dpr); pzCanvas.height=Math.round(H*dpr);
  pzCanvas.style.width=W+'px'; pzCanvas.style.height=H+'px';
  pzCtx.scale(dpr,dpr);
  pzCtx.fillStyle='#12122a'; pzCtx.fillRect(0,0,W,H);
  if(pzSavedImage){const img=new Image();img.onload=()=>pzCtx.drawImage(img,0,0,W,H);img.src=pzSavedImage;}
  pzCtx.lineCap='round'; pzCtx.lineJoin='round';
}
function pzSave(){if(pzCanvas)pzSavedImage=pzCanvas.toDataURL();}
function pzGetXY(e){const r=pzCanvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}
function pzStart(e){
  e.preventDefault(); pzCanvas.setPointerCapture(e.pointerId); pzDrawing=true;
  const{x,y}=pzGetXY(e); pzLastX=x; pzLastY=y;
  pzCtx.beginPath(); pzCtx.arc(x,y,(pzEraser?pzSize*4:pzSize)/2,0,Math.PI*2);
  pzCtx.fillStyle=pzEraser?'#12122a':pzColor; pzCtx.fill();
}
function pzMove(e){
  e.preventDefault(); if(!pzDrawing) return;
  const{x,y}=pzGetXY(e);
  pzCtx.beginPath(); pzCtx.moveTo(pzLastX,pzLastY); pzCtx.lineTo(x,y);
  pzCtx.strokeStyle=pzEraser?'#12122a':pzColor;
  pzCtx.lineWidth=pzEraser?pzSize*4:pzSize;
  pzCtx.lineCap='round'; pzCtx.lineJoin='round'; pzCtx.stroke();
  pzLastX=x; pzLastY=y;
}
function pzEnd(){pzDrawing=false;}
function pzClear(){pzSavedImage=null;if(pzCtx&&pzCanvas){pzCtx.fillStyle='#12122a';pzCtx.fillRect(0,0,pzCanvas.width,pzCanvas.height);}}
function pzSetColor(c){pzSave();pzColor=c;pzEraser=false;pzRenderToolbar();}
function pzSetSize(s){pzSave();pzSize=s;pzRenderToolbar();}
function pzToggleEraser(){pzSave();pzEraser=!pzEraser;pzRenderToolbar();}

// ── PÁGINAS ───────────────────────────────────────────────
function pgHome(){
  return `<div class="bar">
    <div class="logo">Salón<span>Estudio</span></div>
    <div style="display:flex;gap:8px;font-size:13px;font-weight:700">
      <span style="color:#E24B4A">🔥${streak}</span>
      <span style="color:#BA7517">⭐${xp} XP</span>
    </div>
  </div>
  <div class="main">
    <div style="background:linear-gradient(135deg,#1D9E75,#0a5c44);border-radius:18px;padding:18px;margin-bottom:14px;color:#fff">
      <div style="font-size:19px;font-weight:700;margin-bottom:2px">¡Hola, Koke! 👋</div>
      <div style="font-size:12px;opacity:.8">Ing. Comercial · UNAB · IA generativa activa 🤖</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <div onclick="go('chat')" style="background:#E6F1FB;border-radius:14px;padding:14px;cursor:pointer;display:flex;align-items:center;gap:10px">
        <span style="font-size:22px">💬</span><span style="font-size:14px;font-weight:700;color:#378ADD">Explícame</span>
      </div>
      <div onclick="go('errores')" style="background:#FCEBEB;border-radius:14px;padding:14px;cursor:pointer;display:flex;align-items:center;gap:10px">
        <span style="font-size:22px">❌</span><span style="font-size:14px;font-weight:700;color:#E24B4A">Mis Errores</span>
      </div>
    </div>
    <div onclick="openPzModal()" style="background:linear-gradient(135deg,#1a1a2e,#0f3460);border-radius:14px;padding:14px;margin-bottom:14px;cursor:pointer;display:flex;align-items:center;gap:12px;border:1px solid #0f3460">
      <span style="font-size:26px">🖊️</span>
      <div style="flex:1"><div style="font-size:14px;font-weight:700;color:#fff">Pizarra</div><div style="font-size:12px;color:#7a8aaa">Dibuja y anota a mano libre</div></div>
      <span style="color:#444;font-size:20px">›</span>
    </div>
    <div style="font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px">Mis ramos</div>
    ${RAMOS.map(r=>`
      <div class="card" onclick="curRamo=RAMOS.find(x=>x.id==='${r.id}');go('ramo')">
        <div class="ibox" style="background:${r.c}">${r.e}</div>
        <div style="flex:1"><div style="font-size:15px;font-weight:700">${r.n}</div><div style="font-size:12px;color:#888">${TEMAS[r.id].length} temas · ∞ ejercicios IA</div></div>
        <span style="color:#ccc;font-size:20px">›</span>
      </div>`).join('')}
  </div>`;
}

function pgRamo(){
  const R=curRamo;
  return `${topBar(R.n,"go('home')")}
  <div class="main">
    <div style="font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">Tipo</div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      ${[['quiz','📝','Quiz'],['calculo','🔢','Cálculo'],['completar','✏️','Completar']].map(([id,e,n])=>`
        <div onclick="actType='${id}';render()" style="padding:8px 14px;border-radius:999px;border:1.5px solid ${actType===id?R.cb:'#ddd'};background:${actType===id?R.c:'#fff'};cursor:pointer;font-size:13px;font-weight:600;color:${actType===id?R.ct:'#555'}">${e} ${n}</div>`).join('')}
    </div>
    <div style="font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">Temas</div>
    ${TEMAS[R.id].map(t=>`
      <div class="card" onclick="curTema='${t.replace(/'/g,"\\'")}';sQ=0;sC=0;go('practice');loadQ()">
        <div class="ibox" style="background:${R.c}">${R.e}</div>
        <div style="flex:1"><div style="font-size:14px;font-weight:600">${t}</div><div style="font-size:12px;color:#888">${actType==='calculo'?'+25':actType==='quiz'?'+20':'+15'} XP</div></div>
        <span style="color:#ccc;font-size:20px">›</span>
      </div>`).join('')}
  </div>`;
}

async function loadQ(){
  loading=true;q=null;answered=false;sel=null;fillV='';calcV='';showH=false;asistHistory=[];
  render();
  try{const res=await genQ(curRamo.id,curTema,actType);q={...res,type:actType};}
  catch(e){q={type:actType,question:'⚠️ Error al generar pregunta. Intenta de nuevo.',options:['Reintentar','—','—','—'],correct:0,hint:'Revisa tu conexión.',explanation:'',problem:'Error.',answer:'',unit:'',before:'Error',blank:'conexión',after:''};}
  loading=false;render();
}

function answer(ok){
  if(answered)return;
  answered=true;totalQ++;sQ++;
  if(ok){const g=actType==='calculo'?25:actType==='quiz'?20:15;xp+=g;streak++;correct++;sC++;}
  else{streak=0;showH=true;if(q)errors=[{...q,tema:curTema,ts:Date.now()},...errors].slice(0,50);}
  save();render();
}

function pgPractice(){
  const R=curRamo; let body='';
  if(loading){
    body=`<div style="text-align:center;padding:60px 20px">
      <div style="font-size:40px;display:inline-block;animation:spin 1s linear infinite">⚙️</div>
      <div style="font-size:15px;font-weight:600;color:#555;margin-top:14px">Generando ejercicio...</div>
      <div style="font-size:12px;color:#888;margin-top:6px">🤖 Claude está pensando</div>
    </div>`;
  } else if(q){
    if(actType==='quiz'){
      body+=`<div style="font-size:16px;font-weight:600;line-height:1.6;margin-bottom:16px">${q.question||''}</div>`;
      body+=(q.options||[]).map((o,i)=>{
        let cls='opt';
        if(answered){if(i===q.correct)cls+=' ok';else if(i===sel)cls+=' err';}
        return `<button class="${cls}" onclick="if(!answered){sel=${i};answer(${i}===${q.correct})}">${['A','B','C','D'][i]}. ${o}</button>`;
      }).join('');
    }
    if(actType==='completar'){
      body+=`<div style="font-size:15px;line-height:2.5;margin-bottom:14px">${q.before||''} <input id="fi" style="border:none;border-bottom:2px solid ${R.cb};background:transparent;font-size:15px;padding:2px 6px;width:140px;outline:none;text-align:center;font-family:inherit" placeholder="..." ${answered?'disabled':''} value="${answered?q.blank:fillV}"> ${q.after||''}</div>`;
      if(!answered) body+=`<button class="btn" style="background:${R.cb}" onclick="fillV=document.getElementById('fi').value;answer(fillV.trim().toLowerCase()==='${(q.blank||'').toLowerCase()}')">Verificar</button>`;
      if(answered) body+=`<div class="fb ${fillV.trim().toLowerCase()===(q.blank||'').toLowerCase()?'ok':'err'}">${fillV.trim().toLowerCase()===(q.blank||'').toLowerCase()?'✓ ¡Correcto!':'✗ La respuesta es: "'+q.blank+'"'}</div>`;
    }
    if(actType==='calculo'){
      body+=`<div style="font-size:16px;font-weight:600;line-height:1.6;margin-bottom:12px">${q.problem||''}</div>`;
      body+=`<div style="background:${R.c};border-radius:10px;padding:10px 14px;font-size:13px;color:${R.ct};margin-bottom:12px">💡 ${(q.hint||'').split('.')[0]}.</div>`;
      body+=`<input id="ci" style="width:100%;padding:11px;border:1.5px solid #ddd;border-radius:10px;font-size:15px;background:#f9f9f7;font-family:inherit;outline:none;margin-bottom:10px" placeholder="Tu respuesta ${q.unit?'('+q.unit+')':''}" ${answered?'disabled':''} value="${answered?q.answer:calcV}">`;
      if(!answered) body+=`<button class="btn" style="background:${R.cb}" onclick="calcV=document.getElementById('ci').value;answer(calcV.trim().toLowerCase()==='${(q.answer||'').toLowerCase()}')">Verificar</button>`;
      if(answered) body+=`<div class="fb ${calcV.trim().toLowerCase()===(q.answer||'').toLowerCase()?'ok':'err'}">${calcV.trim().toLowerCase()===(q.answer||'').toLowerCase()?'✓ ¡Correcto! Respuesta: '+q.answer+(q.unit?' '+q.unit:''):'✗ Incorrecto. Mira el hint 👇'}</div>`;
    }
    if(answered&&(sel!==q.correct||actType!=='quiz')){
      if(!((actType==='calculo'&&calcV.trim().toLowerCase()===(q.answer||'').toLowerCase())||(actType==='completar'&&fillV.trim().toLowerCase()===(q.blank||'').toLowerCase()))){
        body+=`<div class="hint-box"><div style="font-size:13px;font-weight:700;color:#633806;margin-bottom:6px">📖 Recuerda, Koke:</div>
          <div style="font-size:13px;color:#633806;line-height:1.6;margin-bottom:8px">${q.hint||''}</div>
          ${q.explanation?`<div style="background:#FAEEDA;border-radius:8px;padding:8px 10px;font-size:12px;color:#854F0B;font-weight:600">🔑 ${q.explanation}</div>`:''}
        </div>`;
      }
    }
    if(!answered){
      body+=`<button class="btn" style="background:#f0f0ec;color:#555;border:1px solid #ddd;margin-top:10px" onclick="showH=true;render()">💡 Ver hint</button>`;
      if(showH) body+=`<div class="hint-box" style="margin-top:8px"><div style="font-size:13px;color:#633806;line-height:1.6">${q.hint||''}</div></div>`;
    }
    if(answered) body+=`<button class="btn" style="background:${R.cb};margin-top:12px" onclick="loadQ()">Siguiente ejercicio →</button>`;
  }
  return `${topBar(R?.n||'',"go('ramo')")}
  <div class="main">
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <div style="background:#fff;border:1px solid #e8e8e4;border-radius:10px;padding:10px;flex:1;text-align:center"><div style="font-size:15px;font-weight:700">${sC}/${sQ}</div><div style="font-size:10px;color:#888">Sesión</div></div>
      <div style="background:#fff;border:1px solid #e8e8e4;border-radius:10px;padding:10px;flex:1;text-align:center"><div style="font-size:15px;font-weight:700">🔥${streak}</div><div style="font-size:10px;color:#888">Racha</div></div>
      <div style="background:#fff;border:1px solid #e8e8e4;border-radius:10px;padding:10px;flex:1;text-align:center"><div style="font-size:15px;font-weight:700">⭐${xp}</div><div style="font-size:10px;color:#888">XP</div></div>
    </div>
    ${q&&!loading?`<div style="background:${R?.c};border-radius:999px;padding:3px 10px;font-size:11px;font-weight:700;color:${R?.ct};display:inline-block;margin-bottom:12px">${curTema}</div>`:''}
    ${body}
  </div>`;
}

function pgChat(){
  return `${topBar('Inicio',"go('home')")}
  <div style="background:#fff;border-bottom:1px solid #e8e8e4;padding:8px 16px"><div style="font-size:13px;color:#777">💬 Pregúntame cualquier cosa de tus ramos</div></div>
  <div id="msgs" style="padding:14px;padding-bottom:80px;display:flex;flex-direction:column;gap:10px;height:calc(100vh - 115px);overflow-y:auto">
    ${chatHistory.length===0?`<div style="background:#fff;border:1px solid #e8e8e4;border-radius:14px;padding:12px 14px;font-size:14px;max-width:85%">¡Hola Koke! 🎓 Pregúntame lo que quieras de tus 4 ramos.</div>`:''}
    ${chatHistory.map(m=>m.r==='u'
      ?`<div style="display:flex;justify-content:flex-end"><div style="background:#1D9E75;color:#fff;border-radius:14px 14px 4px 14px;padding:10px 14px;font-size:14px;max-width:82%;line-height:1.5">${m.t}</div></div>`
      :`<div style="background:#fff;border:1px solid #e8e8e4;border-radius:14px;padding:10px 14px;font-size:14px;max-width:85%;line-height:1.5">${m.t}</div>`
    ).join('')}
  </div>
  <div style="position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e8e8e4;padding:10px 14px;display:flex;gap:8px">
    <input id="ci2" placeholder="Escribe tu pregunta..." style="flex:1;padding:10px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;font-family:inherit;outline:none">
    <button onclick="sendChat()" style="padding:10px 16px;border-radius:10px;border:none;background:#1D9E75;color:#fff;font-size:14px;font-weight:700;cursor:pointer">→</button>
  </div>`;
}
async function sendChat(){
  const inp=document.getElementById('ci2');
  if(!inp||!inp.value.trim()) return;
  const msg=inp.value.trim();inp.value='';
  chatHistory=[...chatHistory,{r:'u',t:msg}];render();
  try{
    const ctx=Object.values(CTX).join('\n');
    const resp=await claude(`Eres tutor de Koke, Ing.Comercial UNAB primer año.\nRamos: ${ctx}\nKoke pregunta: "${msg}"\nResponde claro y motivador en máximo 3 oraciones.`,400);
    chatHistory=[...chatHistory,{r:'a',t:resp}];
  }catch(e){chatHistory=[...chatHistory,{r:'a',t:'Error al conectar 😅 Revisa tu conexión.'}];}
  save();render();
  setTimeout(()=>{const el=document.getElementById('msgs');if(el)el.scrollTop=el.scrollHeight;},80);
}

function pgErrores(){
  return `${topBar('Inicio',"go('home')")}
  <div class="main">
    <div style="font-size:17px;font-weight:700;margin-bottom:4px">❌ Mis Errores</div>
    <div style="font-size:13px;color:#777;margin-bottom:14px">${errors.length} guardados</div>
    ${errors.length===0
      ?`<div style="text-align:center;padding:40px;color:#aaa"><div style="font-size:48px;margin-bottom:12px">🎉</div><div style="font-size:16px;font-weight:600">¡Sin errores!</div></div>`
      :errors.map(e=>`<div style="background:#fff;border:1.5px solid #FCEBEB;border-radius:14px;padding:14px;margin-bottom:10px">
          <div style="font-size:11px;color:#E24B4A;font-weight:700;margin-bottom:4px">${e.tema||'—'}</div>
          <div style="font-size:14px;font-weight:600;margin-bottom:8px">${(e.question||e.problem||e.before||'Pregunta').slice(0,100)}</div>
          ${e.hint?`<div style="background:#FFF8E7;border-radius:8px;padding:8px 10px;font-size:12px;color:#633806">📖 ${e.hint}</div>`:''}
        </div>`).join('')}
    ${errors.length>0?`<button class="btn" style="background:#FCEBEB;color:#E24B4A;border:1px solid #fcc;margin-top:4px" onclick="errors=[];save();render()">🗑 Limpiar historial</button>`:''}
  </div>`;
}

function bindInputs(){
  const fi=document.getElementById('fi');
  if(fi) fi.addEventListener('keydown',e=>{if(e.key==='Enter'&&!answered){fillV=fi.value;answer(fillV.trim().toLowerCase()===(q?.blank||'').toLowerCase());}});
  const ci=document.getElementById('ci');
  if(ci) ci.addEventListener('keydown',e=>{if(e.key==='Enter'&&!answered){calcV=ci.value;answer(calcV.trim().toLowerCase()===(q?.answer||'').toLowerCase());}});
  const ci2=document.getElementById('ci2');
  if(ci2) ci2.addEventListener('keydown',e=>{if(e.key==='Enter')sendChat();});
  const ai=document.getElementById('asist-input');
  if(ai) ai.addEventListener('keydown',e=>{if(e.key==='Enter')sendAsist();});
  const msgs=document.getElementById('msgs');
  if(msgs) setTimeout(()=>msgs.scrollTop=msgs.scrollHeight,80);
}

load();
render();
</script>
</body>
</html>
