<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#1D9E75">
<meta name="mobile-web-app-capable" content="yes">
<title>SalónEstudio · Koke</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f0;min-height:100vh;color:#1a1a1a}
.bar{background:#fff;border-bottom:1px solid #e8e8e4;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.logo{font-size:17px;font-weight:700}.logo span{color:#1D9E75}
.main{padding:16px;padding-bottom:90px}
.card{background:#fff;border:1px solid #e8e8e4;border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px}
.card:active{opacity:.8}
.ibox{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.btn{width:100%;padding:13px;border-radius:11px;border:none;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;color:#fff}
.opt{background:#f5f5f0;border:1.5px solid #e8e8e4;border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;font-size:14px;text-align:left;width:100%}
.opt.ok{background:#EAF3DE;border-color:#639922;color:#27500A}
.opt.err{background:#FCEBEB;border-color:#E24B4A;color:#791F1F}
.fb{font-size:13px;padding:11px 14px;border-radius:10px;margin:10px 0;line-height:1.45}
.fb.ok{background:#EAF3DE;color:#27500A}
.fb.err{background:#FCEBEB;color:#791F1F}
.hint{background:#FFF8E7;border:1.5px solid #EF9F27;border-radius:12px;padding:14px;margin-top:8px}
.sec{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.prog{height:6px;background:#f0f0ec;border-radius:999px;overflow:hidden;margin-top:6px}
.prog div{height:100%;border-radius:999px;transition:width .4s}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── CONFIG ────────────────────────────────────────────────────
const PROXY = 'https://salon-proxy.j-quevedo-luengo.workers.dev/';

const RAMOS = [
  {id:'mat',  n:'Matemáticas I',     e:'📐', c:'#FAEEDA', ct:'#633806', cb:'#EF9F27'},
  {id:'eco',  n:'Fund. de Economía', e:'📈', c:'#E1F5EE', ct:'#0F6E56', cb:'#1D9E75'},
  {id:'adm',  n:'Adm. de Empresas',  e:'🏢', c:'#E6F1FB', ct:'#0C447C', cb:'#378ADD'},
  {id:'cont', n:'Contabilidad I',    e:'📒', c:'#EEEDFE', ct:'#3C3489', cb:'#7F77DD'},
];

const TEMAS = {
  mat:  ['Conjuntos y Venn','Expresiones Algebraicas','Ecuaciones Lineales','Sistemas 2×2','Sucesiones y Sumatorias','Inducción Matemática'],
  eco:  ['10 Principios Mankiw','FPP y modelos','Ventaja Comparativa','Oferta y Demanda','Elasticidad','Políticas del Gobierno'],
  adm:  ['Historia y Enfoques','Planeación','Organización','Dirección y Liderazgo','Porter y FODA'],
  cont: ['Conceptos Fundamentales','Asientos Contables','IVA y PPM','FIFO y PPP','Libro Mayor y Balance'],
};

const CTX = {
  mat:  'Matemáticas I Ingeniería Comercial UNAB Chile. Temas: conjuntos (unión, intersección, complemento, diferencia, cardinalidad, Venn), expresiones algebraicas y factorización (cuadrado binomio, diferencia cuadrados, cubos, trinomios), ecuaciones lineales y cuadráticas (fórmula general), sistemas de ecuaciones 2x2 (sustitución, eliminación), sucesiones (aₙ, Σk=n(n+1)/2, Σk²=n(n+1)(2n+1)/6), inducción matemática. Ref: Sullivan 7ma, Álgebra de Baldor.',
  eco:  'Economía Ingeniería Comercial UNAB. Mankiw 7ma Cap 1-6: 10 principios (costo oportunidad, marginal, incentivos, mano invisible, tradeoffs), FPP (eficiente/ineficiente/imposible), economía positiva vs normativa, ceteris paribus, ventaja comparativa vs absoluta, ley demanda (inversa P-Qd), ley oferta (directa P-Qs), desplazamientos curvas, equilibrio Qd=Qs, elasticidades (precio, ingreso, cruzada), precio máximo (escasez), precio mínimo (excedente), impuestos y peso muerto.',
  adm:  'Administración de Empresas Ingeniería Comercial UNAB. Material UNAB: Taylor (adm. científica 1911), Fayol (14 principios, 5 funciones: planificación/organización/dirección/coordinación/control), Hawthorne (normas sociales), sinergia, planeación (estratégica/táctica/operativa), misión/visión/FODA, organización 2da fase, organigramas (lineal/funcional/matricial), unidad de mando, centralización vs descentralización, 3 liderazgos (autocrático/anárquico/democrático), comunicación, 5 Fuerzas Porter, cadena de valor.',
  cont: 'Contabilidad I Ingeniería Comercial UNAB. Contabilidad chilena: ecuación A=P+Patrimonio, partida doble (DEBE=cargo aumenta activos/gastos; HABER=abono aumenta pasivos/patrimonio/ingresos), libro diario y mayor (cuentas T, saldo deudor/acreedor), glosa, asientos apertura/compra/venta, IVA 19% (crédito fiscal=compras, débito fiscal=ventas), PPM (% ingresos brutos), FIFO y PPP (precio promedio ponderado), tarjeta existencias, costo ventas, balance 8 columnas.',
};

// ── STATE ──────────────────────────────────────────────────────
let xp=0, streak=0, totalQ=0, correct=0;
let screen='home', prevScreen='home';
let curRamo=null, curTema=null, actType='quiz';
let question=null, loading=false, answered=false;
let selected=null, fillVal='', calcVal='', showHint=false;
let sessionQ=0, sessionC=0;
let errors=[];
let chatHistory=[];
let chatLoading=false;
let kokeMode='normal', kokeBubble='¡Listo Koke! 💪';

// ── LOAD/SAVE ─────────────────────────────────────────────────
function load(){
  try{
    const s=JSON.parse(localStorage.getItem('sx_v3')||'{}');
    xp=s.xp||0; streak=s.streak||0; totalQ=s.totalQ||0;
    correct=s.correct||0; errors=s.errors||[];
    chatHistory=s.chat||[];
  }catch(e){}
}
function save(){
  try{ localStorage.setItem('sx_v3',JSON.stringify({xp,streak,totalQ,correct,errors,chat:chatHistory})); }catch(e){}
}

// ── API ────────────────────────────────────────────────────────
async function callClaude(prompt, maxTok=1000){
  const r = await fetch(PROXY, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:maxTok,
      messages:[{role:'user',content:prompt}]
    })
  });
  const d = await r.json();
  return d.content?.map(c=>c.text||'').join('')||'';
}

async function genQuestion(ramoId, tema, type){
  const ctx = CTX[ramoId];
  const prompts = {
    quiz:`${ctx}\nGenera UNA pregunta de opción múltiple sobre "${tema}". SOLO JSON sin backticks ni texto extra:\n{"question":"...","options":["A","B","C","D"],"correct":0,"hint":"explicación breve de por qué es correcta","explanation":"concepto clave"}`,
    calculo:`${ctx}\nGenera UN ejercicio de cálculo con números concretos sobre "${tema}". SOLO JSON sin backticks:\n{"problem":"enunciado","answer":"respuesta exacta","hint":"pasos para resolver","explanation":"fórmula o concepto clave","unit":"unidad"}`,
    completar:`${ctx}\nGenera UNA oración para completar sobre "${tema}". SOLO JSON sin backticks:\n{"before":"texto antes","blank":"respuesta (max 3 palabras)","after":"texto después","hint":"explicación","explanation":"concepto clave"}`,
  };
  const txt = await callClaude(prompts[type]||prompts.quiz, 800);
  const clean = txt.replace(/```json|```/g,'').trim();
  return JSON.parse(clean);
}

// ── KOKE ───────────────────────────────────────────────────────
function setKoke(mode, msg){ kokeMode=mode; kokeBubble=msg; }

function kokeFloat(){
  const faces = {
    normal:'🧔🏻', happy:'🧔🏻', sad:'🧔🏻', think:'🧔🏻'
  };
  const rings = {
    normal:'#e8e8e4', happy:'#1D9E75', sad:'#E24B4A', think:'#378ADD'
  };
  const badges = { happy:'⭐', sad:'💧', think:'💭', normal:'' };
  return `<div style="position:fixed;bottom:16px;right:14px;z-index:50;display:flex;flex-direction:column;align-items:flex-end;gap:6px">
    ${kokeBubble?`<div style="background:#fff;border:1px solid #e8e8e4;border-radius:12px 12px 4px 12px;padding:8px 12px;max-width:180px;font-size:12px;font-weight:500;line-height:1.4;box-shadow:0 2px 10px rgba(0,0,0,.1)">${kokeBubble}</div>`:''}
    <div style="display:flex;align-items:flex-end;gap:8px">
      <div onclick="goScreen('pizarra')" style="width:44px;height:44px;border-radius:50%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.25);font-size:20px">📐</div>
      <div onclick="setKoke('normal','¡Aquí estoy! 💪');render()" style="width:58px;height:58px;border-radius:50%;background:#fff;border:2.5px solid ${rings[kokeMode]||'#e8e8e4'};display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.15);position:relative">
        <span style="font-size:28px;line-height:1">${faces[kokeMode]||'🧔🏻'}</span>
        <span style="font-size:11px;line-height:1">🧥</span>
        ${badges[kokeMode]?`<div style="position:absolute;top:-4px;right:-4px;font-size:14px">${badges[kokeMode]}</div>`:''}
      </div>
    </div>
  </div>`;
}

// ── NAVIGATION ─────────────────────────────────────────────────
function goScreen(s){ prevScreen=screen; screen=s; render(); }
function goBack(){ screen=prevScreen; render(); }

function topbar(back, backFn){
  return `<div class="bar">
    <span onclick="${backFn||"goBack()"}" style="font-size:14px;color:#666;cursor:pointer">‹ ${back}</span>
    <div class="logo">Salón<span>Estudio</span></div>
    <div style="display:flex;gap:8px;font-size:13px;font-weight:700">
      <span style="color:#E24B4A">🔥${streak}</span>
      <span style="color:#BA7517">⭐${xp}</span>
    </div>
  </div>`;
}

// ── RENDER ─────────────────────────────────────────────────────
function render(){
  const screens = {home:home,ramo:ramo,practice:practice,chat:chat,pizarra:pizarra,errores:errores};
  document.getElementById('app').innerHTML = (screens[screen]||home)();
  bind();
}

// ── HOME ───────────────────────────────────────────────────────
function home(){
  const precis = totalQ>0?Math.round((correct/totalQ)*100):0;
  return `<div class="bar">
    <div class="logo">Salón<span>Estudio</span></div>
    <div style="display:flex;gap:8px;font-size:13px;font-weight:700">
      <span style="color:#E24B4A">🔥${streak}</span>
      <span style="color:#BA7517">⭐${xp} XP</span>
    </div>
  </div>
  <div class="main">
    <div style="background:linear-gradient(135deg,#1D9E75,#0a5c44);border-radius:18px;padding:18px;margin-bottom:14px;color:#fff">
      <div style="font-size:18px;font-weight:700;margin-bottom:2px">¡Hola, Koke! 👋</div>
      <div style="font-size:12px;opacity:.8">Ing. Comercial · UNAB Advance · 1er Trimestre</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
      ${[{e:'⭐',l:'XP',v:xp},{e:'🔥',l:'Racha',v:streak},{e:'🎯',l:'Precisión',v:precis+'%'}].map(s=>`
        <div style="background:#fff;border:1px solid #e8e8e4;border-radius:12px;padding:12px;text-align:center">
          <div style="font-size:20px;font-weight:700">${s.v}</div>
          <div style="font-size:10px;color:#888;margin-top:2px">${s.e} ${s.l}</div>
        </div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
      <div onclick="goScreen('chat')" style="background:#E6F1FB;border-radius:14px;padding:14px;cursor:pointer;display:flex;align-items:center;gap:10px">
        <span style="font-size:22px">💬</span><div style="font-size:14px;font-weight:700;color:#378ADD">Explícame</div>
      </div>
      <div onclick="goScreen('errores')" style="background:#FCEBEB;border-radius:14px;padding:14px;cursor:pointer;display:flex;align-items:center;gap:10px">
        <span style="font-size:22px">❌</span><div style="font-size:14px;font-weight:700;color:#E24B4A">Mis Errores</div>
      </div>
    </div>
    <div class="sec">Mis ramos</div>
    ${RAMOS.map(r=>`
      <div class="card" onclick="curRamo=RAMOS.find(x=>x.id==='${r.id}');goScreen('ramo')">
        <div class="ibox" style="background:${r.c}">${r.e}</div>
        <div style="flex:1">
          <div style="font-size:15px;font-weight:700;margin-bottom:2px">${r.n}</div>
          <div style="font-size:12px;color:#888">${TEMAS[r.id].length} temas · IA generativa</div>
        </div>
        <span style="color:#ccc;font-size:18px">›</span>
      </div>`).join('')}
  </div>
  ${kokeFloat()}`;
}

// ── RAMO ───────────────────────────────────────────────────────
function ramo(){
  const R = curRamo;
  return `${topbar(R.n,"goScreen('home')")}
  <div class="main">
    <div class="sec">Tipo de ejercicio</div>
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      ${[{id:'quiz',e:'📝',n:'Quiz'},{id:'calculo',e:'🔢',n:'Cálculo'},{id:'completar',e:'✏️',n:'Completar'}].map(a=>`
        <div onclick="actType='${a.id}';render()" style="padding:8px 14px;border-radius:999px;border:1.5px solid ${actType===a.id?R.cb:'#ddd'};background:${actType===a.id?R.c:'#fff'};cursor:pointer;font-size:13px;font-weight:600;color:${actType===a.id?R.ct:'#555'}">
          ${a.e} ${a.n}
        </div>`).join('')}
    </div>
    <div class="sec">Temas</div>
    ${TEMAS[R.id].map(t=>`
      <div class="card" onclick="curTema='${t}';sessionQ=0;sessionC=0;goScreen('practice');loadQ()">
        <div class="ibox" style="background:${R.c}">${R.e}</div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:600">${t}</div>
          <div style="font-size:12px;color:#888">${actType==='calculo'?'+25':actType==='quiz'?'+20':'+15'} XP · IA generativa</div>
        </div>
        <span style="color:#ccc;font-size:18px">›</span>
      </div>`).join('')}
  </div>
  ${kokeFloat()}`;
}

// ── LOAD QUESTION ──────────────────────────────────────────────
async function loadQ(){
  loading=true; question=null; answered=false;
  selected=null; fillVal=''; calcVal=''; showHint=false;
  setKoke('think','Generando ejercicio... ⚙️');
  render();
  try{
    const q = await genQuestion(curRamo.id, curTema, actType);
    question = {...q, type:actType};
    setKoke('normal','¿Sabes la respuesta? 🤔');
  }catch(e){
    question = {type:actType, question:'Error de conexión. Verifica internet.',
      options:['Reintentar','—','—','—'],correct:0,
      hint:'Verifica tu conexión a internet.',explanation:'',
      problem:'Error de conexión.',answer:'',unit:'',
      before:'Sin',blank:'conexión',after:'.'};
    setKoke('sad','Sin conexión 😅');
  }
  loading=false; render();
}

function handleAnswer(isCorrect){
  if(answered) return;
  answered=true; totalQ++; sessionQ++;
  if(isCorrect){
    const gain=actType==='calculo'?25:actType==='quiz'?20:15;
    xp+=gain; streak++; correct++; sessionC++;
    if(streak>=3) setKoke('happy','¡Estado de flujo! 🌿🔥');
    else setKoke('happy','¡Correcto! +'+gain+' XP ⭐');
  } else {
    streak=0;
    if(question) errors=[{...question,tema:curTema,ramo:curRamo?.id,ts:Date.now()},...errors].slice(0,50);
    setKoke('sad','Mira el hint 👇');
    showHint=true;
  }
  save(); render();
}

// ── PRACTICE ───────────────────────────────────────────────────
function practice(){
  const R=curRamo; const q=question;
  const isOk = q?(
    actType==='quiz'?selected===q.correct:
    actType==='calculo'?calcVal.trim().toLowerCase()===(q.answer||'').toLowerCase():
    fillVal.trim().toLowerCase()===(q.blank||'').toLowerCase()
  ):false;

  let body='';
  if(loading){
    body=`<div style="text-align:center;padding:50px 20px">
      <div style="font-size:38px;display:inline-block;animation:spin 1s linear infinite">⚙️</div>
      <div style="font-size:15px;font-weight:600;color:#555;margin-top:14px">Claude generando ejercicio único...</div>
      <div style="font-size:12px;color:#888;margin-top:6px">🤖 Nunca la misma pregunta dos veces</div>
    </div>`;
  } else if(q){
    if(actType==='quiz'){
      body=`<div style="font-size:16px;font-weight:600;line-height:1.6;margin-bottom:16px">${q.question||''}</div>
        ${(q.options||[]).map((o,i)=>{
          let cls='opt';
          if(answered){if(i===q.correct)cls+=' ok';else if(i===selected)cls+=' err';}
          return `<button class="${cls}" onclick="if(!answered){selected=${i};handleAnswer(${i}===${q.correct})}">${['A','B','C','D'][i]}. ${o}</button>`;
        }).join('')}`;
    }
    if(actType==='completar'){
      body=`<div style="font-size:15px;line-height:2.5;margin-bottom:14px">
        ${q.before||''} <input id="fi" style="border:none;border-bottom:2px solid ${R.cb};background:transparent;font-size:15px;padding:2px 6px;width:140px;outline:none;text-align:center;font-family:inherit" placeholder="..." ${answered?'disabled':''} value="${answered?q.blank:fillVal}"> ${q.after||''}
      </div>
      ${!answered?`<button class="btn" style="background:${R.cb}" onclick="fillVal=document.getElementById('fi')?.value||'';handleAnswer(fillVal.trim().toLowerCase()==='${(q.blank||'').toLowerCase()}')">Verificar</button>`:''}
      ${answered?`<div class="fb ${isOk?'ok':'err'}">${isOk?'✓ ¡Correcto!':'✗ La respuesta es: "'+q.blank+'"'}</div>`:''}`;
    }
    if(actType==='calculo'){
      body=`<div style="font-size:16px;font-weight:600;line-height:1.6;margin-bottom:12px">${q.problem||''}</div>
        <div style="background:${R.c};border-radius:10px;padding:10px 14px;font-size:13px;color:${R.ct};margin-bottom:12px">💡 ${(q.hint||'').split('.')[0]}.</div>
        <input id="ci" style="width:100%;padding:11px;border:1.5px solid #ddd;border-radius:10px;font-size:15px;background:#f9f9f7;font-family:inherit;outline:none;margin-bottom:10px" placeholder="Tu respuesta ${q.unit?'('+q.unit+')':''}" ${answered?'disabled':''} value="${answered?q.answer:calcVal}">
        ${!answered?`<button class="btn" style="background:${R.cb}" onclick="calcVal=document.getElementById('ci')?.value||'';handleAnswer(calcVal.trim().toLowerCase()==='${(q.answer||'').toLowerCase()}')">Verificar</button>`:''}
        ${answered?`<div class="fb ${isOk?'ok':'err'}">${isOk?'✓ ¡Correcto! Respuesta: '+q.answer+(q.unit?' '+q.unit:''):'✗ Incorrecto. Mira el hint 👇'}</div>`:''}`;
    }

    if(answered&&!isOk){
      body+=`<div class="hint"><div style="font-size:13px;font-weight:700;color:#633806;margin-bottom:6px">📖 Recuerda, Koke:</div>
        <div style="font-size:13px;color:#633806;line-height:1.6;margin-bottom:8px">${q.hint||''}</div>
        ${q.explanation?`<div style="background:#FAEEDA;border-radius:8px;padding:8px 10px;font-size:12px;color:#854F0B;font-weight:600">🔑 Clave: ${q.explanation}</div>`:''}
      </div>`;
    }
    if(answered&&isOk&&q.explanation){
      body+=`<div style="background:#EAF3DE;border:1px solid #639922;border-radius:10px;padding:10px 14px;margin-top:8px;font-size:12px;color:#27500A">🌿 ${q.explanation}</div>`;
    }
    if(!answered){
      body+=`<button class="btn" style="background:#f0f0ec;color:#555;border:1px solid #ddd;margin-top:10px" onclick="showHint=true;setKoke('think','Aquí va el hint 💡');render()">💡 Ver hint</button>`;
      if(showHint) body+=`<div class="hint" style="margin-top:8px"><div style="font-size:12px;font-weight:700;color:#633806;margin-bottom:4px">💡 Hint:</div><div style="font-size:13px;color:#633806;line-height:1.6">${q.hint||''}</div></div>`;
    }
    if(answered){
      body+=`<button class="btn" style="background:${R.cb};margin-top:12px" onclick="loadQ()">Siguiente →</button>`;
    }
  }

  return `${topbar(R?.n||'','goScreen(\'ramo\')')}
  <div class="main">
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <div style="background:#fff;border:1px solid #e8e8e4;border-radius:10px;padding:10px;flex:1;text-align:center">
        <div style="font-size:15px;font-weight:700">${sessionC}/${sessionQ}</div>
        <div style="font-size:10px;color:#888">Sesión</div>
      </div>
      <div style="background:#fff;border:1px solid #e8e8e4;border-radius:10px;padding:10px;flex:1;text-align:center">
        <div style="font-size:15px;font-weight:700">${R?.e}</div>
        <div style="font-size:10px;color:#888">Ramo</div>
      </div>
      <div style="background:#fff;border:1px solid #e8e8e4;border-radius:10px;padding:10px;flex:1;text-align:center">
        <div style="font-size:15px;font-weight:700">${actType==='quiz'?'📝':actType==='calculo'?'🔢':'✏️'}</div>
        <div style="font-size:10px;color:#888">Tipo</div>
      </div>
    </div>
    ${q&&!loading?`<div style="background:${R?.c};border-radius:999px;padding:3px 10px;font-size:11px;font-weight:700;color:${R?.ct};display:inline-block;margin-bottom:12px">${curTema}</div>`:''}
    ${body}
  </div>
  ${kokeFloat()}`;
}

      :`<div style="display:flex;gap:8px;align-items:flex-end">

        <div style="background:#fff;border:1px solid #e8e8e4;border-radius:14px 14px 14px 4px;padding:10px 14px;font-size:14px;max-width:80%;line-height:1.5">${m.txt}</div>

      <div style="background:#fff;border:1px solid #e8e8e4;border-radius:14px;padding:10px 14px;font-size:14px;color:#888">Pensando... ⚙️</div>

async function sendChat(){
  const inp=document.getElementById('chat-in');
  if(!inp||!inp.value.trim()||chatLoading) return;
  const msg=inp.value.trim(); inp.value='';
  chatHistory=[...chatHistory,{role:'user',txt:msg}];
  chatLoading=true; render();
  try{
    const allCtx=Object.values(CTX).join('\n');
    const hist=chatHistory.slice(-6).map(m=>`${m.role==='user'?'Koke':'Tutor'}: ${m.txt}`).join('\n');
    const prompt=`Eres tutor de Koke, estudiante de Ingeniería Comercial UNAB primer año. Ramos: ${allCtx}\n\nHistorial:\n${hist}\n\nKoke pregunta: "${msg}"\n\nResponde claro y motivador en máximo 3 oraciones. Usa emojis ocasionalmente.`;
    const resp=await callClaude(prompt,400);
    chatHistory=[...chatHistory,{role:'assistant',txt:resp}];
  }catch(e){
    chatHistory=[...chatHistory,{role:'assistant',txt:'Sin conexión 😅 Verifica internet.'}];
  }
  save(); chatLoading=false; render();
  setTimeout(()=>{ const el=document.getElementById('chat-msgs'); if(el) el.scrollTop=el.scrollHeight; },80);
}

// ── PIZARRA ────────────────────────────────────────────────────
function pizarra(){
  return `<div style="display:flex;flex-direction:column;height:100vh;background:#1a1a1a;user-select:none;-webkit-user-select:none;touch-action:none;font-family:-apple-system,sans-serif">
    <div style="background:#fff;padding:8px 10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1px solid #e8e8e4">
      <button onclick="goBack()" style="padding:6px 12px;border-radius:10px;border:none;background:#EF9F27;color:#fff;font-weight:700;font-size:13px;cursor:pointer">← Volver</button>
      <div style="width:1px;height:30px;background:#e8e8e4"></div>
      ${[['pen','✏️','Lápiz'],['line','📏','Línea'],['eraser','⬜','Goma']].map(([id,e,n])=>`
        <button id="tb-${id}" onclick="pTool('${id}')" style="padding:5px 8px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:${id==='pen'?'#1D9E75':'#f0f0ec'};color:${id==='pen'?'#fff':'#333'}">${e} ${n}</button>`).join('')}
      <div style="width:1px;height:30px;background:#e8e8e4"></div>
      ${[2,4,8,14,22].map((s,i)=>`<button id="sz-${i}" onclick="pSize(${i})" style="width:${24+i*3}px;height:${24+i*3}px;border-radius:50%;border:2px solid ${i===2?'#1D9E75':'#ddd'};background:${i===2?'#E1F5EE':'#f5f5f5'};cursor:pointer;display:flex;align-items:center;justify-content:center">
        <div style="width:${Math.min(s,14)}px;height:${Math.min(s,14)}px;border-radius:50%;background:${i===2?'#1D9E75':'#333'}"></div>
      </button>`).join('')}
      <div style="width:1px;height:30px;background:#e8e8e4"></div>
      ${['#1a1a1a','#E24B4A','#1D9E75','#378ADD','#EF9F27','#7F77DD','#fff'].map(c=>`
        <button id="cl-${c.replace('#','')}" onclick="pColor('${c}')" style="width:24px;height:24px;border-radius:50%;border:2.5px solid ${c==='#1a1a1a'?'#1D9E75':'transparent'};background:${c};cursor:pointer;box-shadow:0 0 0 1px ${c==='#fff'?'#ccc':'transparent'}"></button>`).join('')}
      <div style="width:1px;height:30px;background:#e8e8e4"></div>
      <button onclick="pUndo()" style="padding:5px 8px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:#f0f0ec;color:#333">↩ Deshacer</button>
      <button onclick="pClear()" style="padding:5px 8px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:#fff;color:#E24B4A">🗑 Limpiar</button>
    </div>
    <div id="pw" style="flex:1;position:relative;overflow:hidden">
      <div style="position:absolute;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(0,0,0,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.07) 1px,transparent 1px);background-size:40px 40px;background-color:#FFFEF5"></div>
      <canvas id="pc" style="position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;z-index:1;cursor:crosshair"></canvas>
    </div>
  </div>`;
}

// ── PIZARRA LOGIC ──────────────────────────────────────────────
const P={tool:'pen',color:'#1a1a1a',si:2,bg:'#FFFEF5',drawing:false,last:null,start:null,snap:null,hist:[],sizes:[2,4,8,14,22]};

function bindPizarra(){
  const cv=document.getElementById('pc');
  const pw=document.getElementById('pw');
  if(!cv||!pw) return;
  const init=()=>{
    const w=pw.clientWidth,h=pw.clientHeight;
    const tmp=P.hist.length>0?cv.toDataURL():null;
    cv.width=w;cv.height=h;
    const c=cv.getContext('2d');c.fillStyle=P.bg;c.fillRect(0,0,w,h);
    if(tmp){const img=new Image();img.onload=()=>c.drawImage(img,0,0);img.src=tmp;}
  };
  init();
  if(pw._ro) pw._ro.disconnect();
  pw._ro=new ResizeObserver(init);pw._ro.observe(pw);

  const ctx=()=>cv.getContext('2d');
  const pt=e=>{
    const r=cv.getBoundingClientRect(),sx=cv.width/r.width,sy=cv.height/r.height;
    const s=e.touches?e.touches[0]:e;
    return{x:(s.clientX-r.left)*sx,y:(s.clientY-r.top)*sy};
  };
  const push=()=>{P.hist=[...P.hist.slice(-25),cv.toDataURL()];};

  window.pUndo=()=>{
    if(!P.hist.length) return;
    const prev=P.hist[P.hist.length-1];P.hist=P.hist.slice(0,-1);
    const c=ctx(),img=new Image();img.onload=()=>{c.clearRect(0,0,cv.width,cv.height);c.drawImage(img,0,0);};img.src=prev;
  };
  window.pClear=()=>{push();const c=ctx();c.fillStyle=P.bg;c.fillRect(0,0,cv.width,cv.height);};
  window.pTool=t=>{
    P.tool=t;
    ['pen','line','eraser'].forEach(id=>{const b=document.getElementById('tb-'+id);if(b){b.style.background=id===t?'#1D9E75':'#f0f0ec';b.style.color=id===t?'#fff':'#333';}});
  };
  window.pSize=i=>{
    P.si=i;
    [0,1,2,3,4].forEach(j=>{const b=document.getElementById('sz-'+j);if(b){b.style.borderColor=j===i?'#1D9E75':'#ddd';b.style.background=j===i?'#E1F5EE':'#f5f5f5';if(b.firstElementChild)b.firstElementChild.style.background=j===i?'#1D9E75':'#333';}});
  };
  window.pColor=c=>{
    P.color=c;if(P.tool==='eraser')P.tool='pen';
    ['#1a1a1a','#E24B4A','#1D9E75','#378ADD','#EF9F27','#7F77DD','#fff'].forEach(col=>{const b=document.getElementById('cl-'+col.replace('#',''));if(b)b.style.borderColor=col===c?'#1D9E75':'transparent';});
  };

  const down=e=>{
    e.preventDefault();push();P.drawing=true;
    const p=pt(e);P.last=p;P.start=p;
    if(P.tool==='line'){P.snap=cv.toDataURL();return;}
    const c=ctx(),sw=P.tool==='eraser'?P.sizes[P.si]*2.5:P.sizes[P.si];
    c.beginPath();c.arc(p.x,p.y,sw/2,0,Math.PI*2);c.fillStyle=P.tool==='eraser'?P.bg:P.color;c.fill();
    c.beginPath();c.moveTo(p.x,p.y);
  };
  const move=e=>{
    if(!P.drawing)return;e.preventDefault();
    const p=pt(e),c=ctx(),sw=P.tool==='eraser'?P.sizes[P.si]*2.5:P.sizes[P.si];
    if(P.tool==='line'){
      const img=new Image();img.onload=()=>{c.clearRect(0,0,cv.width,cv.height);c.drawImage(img,0,0);c.beginPath();c.moveTo(P.start.x,P.start.y);c.lineTo(p.x,p.y);c.strokeStyle=P.color;c.lineWidth=P.sizes[P.si];c.lineCap='round';c.stroke();};img.src=P.snap;P.last=p;return;
    }
    c.beginPath();c.moveTo(P.last.x,P.last.y);c.lineTo(p.x,p.y);c.strokeStyle=P.tool==='eraser'?P.bg:P.color;c.lineWidth=sw;c.lineCap='round';c.lineJoin='round';c.stroke();P.last=p;
  };
  const up=e=>{if(!P.drawing)return;e.preventDefault();P.drawing=false;};

  cv.addEventListener('mousedown',down);cv.addEventListener('mousemove',move);cv.addEventListener('mouseup',up);cv.addEventListener('mouseleave',up);
  cv.addEventListener('touchstart',down,{passive:false});cv.addEventListener('touchmove',move,{passive:false});cv.addEventListener('touchend',up);cv.addEventListener('touchcancel',up);
}

// ── BIND ───────────────────────────────────────────────────────
function bind(){
  if(screen==='pizarra') bindPizarra();
  if(screen==='practice'){
    const fi=document.getElementById('fi');
    if(fi) fi.addEventListener('keydown',e=>{if(e.key==='Enter'&&!answered){fillVal=fi.value;handleAnswer(fillVal.trim().toLowerCase()===(question?.blank||'').toLowerCase());}});
    const ci=document.getElementById('ci');
    if(ci) ci.addEventListener('keydown',e=>{if(e.key==='Enter'&&!answered){calcVal=ci.value;handleAnswer(calcVal.trim().toLowerCase()===(question?.answer||'').toLowerCase());}});
  }
  if(screen==='chat'){
    const inp=document.getElementById('chat-in');
    if(inp) inp.addEventListener('keydown',e=>{if(e.key==='Enter')sendChat();});
    setTimeout(()=>{const el=document.getElementById('chat-msgs');if(el)el.scrollTop=el.scrollHeight;},80);
  }
}

load();
render();
