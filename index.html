async function callClaude(prompt, maxTok=1500){
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':API_KEY,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTok,messages:[{role:'user',content:prompt}]})
  });
  const d=await r.json();
  return d.content?.map(c=>c.text||'').join('')||'';
}

async function genBatch(ramoId,tema,type,count){
  const ctx=CTX[ramoId];
  const p={
    quiz:`${ctx}\nGenera ${count} preguntas múltiple choice DISTINTAS sobre "${tema}". Varía dificultad. SOLO JSON array sin backticks:\n[{"question":"...","options":["A","B","C","D"],"correct":0,"hint":"explicación 2 oraciones","explanation":"concepto clave 1 oración"}]`,
    calculo:`${ctx}\nGenera ${count} ejercicios de cálculo DISTINTOS con números diferentes sobre "${tema}". SOLO JSON array sin backticks:\n[{"problem":"enunciado con números concretos","answer":"respuesta exacta","hint":"pasos para resolver","explanation":"fórmula o concepto clave","unit":"unidad de medida"}]`,
    completar:`${ctx}\nGenera ${count} oraciones para completar DISTINTAS sobre "${tema}". SOLO JSON array sin backticks:\n[{"before":"texto antes del espacio","blank":"palabra o frase correcta (max 4 palabras)","after":"texto después","hint":"explicación breve","explanation":"concepto clave"}]`,
    examen:`${ctx}\nGenera 5 preguntas de examen variadas sobre "${tema}". SOLO JSON array sin backticks:\n[{"question":"...","options":["A","B","C","D"],"correct":0,"hint":"..."}]`,
  };
  const txt=await callClaude(p[type]||p.quiz,4000);
  const arr=JSON.parse(txt.replace(/```json|```/g,'').trim());
  return Array.isArray(arr)?arr:[arr];
}

async function chatClaude(msg,history){
  const allCtx=Object.values(CTX).join('\n\n');
  const hist=history.slice(-6).map(m=>`${m.role==='user'?'Koke':'Tutor'}: ${m.txt}`).join('\n');
  const prompt=`Eres el tutor personal de Koke, estudiante de Ingeniería Comercial UNAB primer año. Contexto de sus 4 ramos:\n${allCtx}\n\nHistorial reciente:\n${hist}\n\nKoke pregunta: "${msg}"\n\nResponde claro, simple y motivador en máximo 4 oraciones. Usa emojis ocasionalmente. Si hay fórmula, muéstrala claramente.`;
  return await callClaude(prompt,500);
}

  render();

  if(onlineStatus && countCached()<(Object.values(TEMAS).flat().length*TYPES_CACHE.length*PER_TEMA*0.5)){
    setTimeout(()=>startDownload(true),3000);
  }
}

async function saveStats(){
  await db.set(STATS_KEY,{xp:S.xp,streak:S.streak,maxStreak:S.maxStreak,totalQ:S.totalQ,correct:S.correct,errors:S.errors,ramosSeen:S.ramosSeen,badges:S.badges,exams:S.exams,chats:S.chats,offlineSessions:S.offlineSessions,ramoProgress:S.ramoProgress,spaced:S.spaced});
}

function checkBadges(){
  const cur=S.badges||[];
  let changed=false;
  BADGE_DEFS.forEach(b=>{
    if(!cur.includes(b.id)&&b.cond(S)){
      cur.push(b.id);
      newBadgeG=b;
      setTimeout(()=>{newBadgeG=null;render();},3000);
      changed=true;
    }
  });
  if(changed){S.badges=cur;saveStats();}
}

function addXP(n,isCorrect,ramoId,tema,q){
  if(isCorrect){
    S.xp+=n; S.streak++; S.maxStreak=Math.max(S.maxStreak,S.streak); S.correct++;
    if(S.streak>=3) setKoke('flow',rnd(KMSGS.flow));
    else setKoke('happy',rnd(KMSGS.happy));
    if(tema){S.spaced=S.spaced||{};S.spaced[tema]=(S.spaced[tema]||0)+1;}
  } else {
    S.streak=0;
    setKoke('sad',rnd(KMSGS.sad));
    if(q){S.errors=[{...q,ramo:ramoId,tema,ts:Date.now()},...(S.errors||[])].slice(0,60);}
    if(tema){S.spaced=S.spaced||{};S.spaced[tema]=Math.max(0,(S.spaced[tema]||0)-1);}
  }
  S.totalQ++;
  if(ramoId){S.ramosSeen=S.ramosSeen||{};S.ramosSeen[ramoId]=true;}
  S.ramoProgress=S.ramoProgress||{};
  if(ramoId) S.ramoProgress[ramoId]=Math.min(100,(S.ramoProgress[ramoId]||0)+(isCorrect?2:0));
  checkBadges();
  saveStats();
}

function setKoke(mode,bubble){kokeModeG=mode;kokeBubbleG=bubble;}

function countCached(){
  return Object.values(cacheMeta).reduce((a,t)=>a+Object.values(t).reduce((b,v)=>b+v,0),0);
}

function getFromCache(ramoId,tema,type){
  const key=`${ramoId}__${tema}__${type}`;
  const pool=cache[key]||[];
  if(pool.length===0) return null;
  return pool[Math.floor(Math.random()*pool.length)];
}

// ════════════════════════════════════════════════════════════════
// DOWNLOAD CACHE
// ════════════════════════════════════════════════════════════════
async function startDownload(auto=false){
  if(!onlineStatus||dlRunning) return;
  dlCancel=false; dlRunning=true; dlProgress=0; dlDone=0;
  goScreen('cache');
  const queue=[];
  for(const r of RAMOS){
    for(const t of TEMAS[r.id]){
      for(const tp of TYPES_CACHE){
        const have=cacheMeta[t]?.[tp]||0;
        if(have<PER_TEMA) queue.push({ramo:r,tema:t,type:tp,need:PER_TEMA-have});
      }
    }
  }
  dlTotal=queue.reduce((a,q)=>a+q.need,0);
  if(dlTotal===0){dlRunning=false;render();return;}
  render();
  for(const task of queue){
    if(dlCancel) break;
    const {ramo,tema,type,need}=task;
    dlCurrent=`${ramo.e} ${tema.slice(0,28)} · ${type}`;
    render();
    let gen=[], rem=need;
    while(rem>0&&!dlCancel){
      const bn=Math.min(BATCH_SIZE,rem);
      try{
        const b=await genBatch(ramo.id,tema,type,bn);
        gen=[...gen,...b]; rem-=b.length; dlDone+=b.length;
        dlProgress=Math.round((dlDone/dlTotal)*100);
        render();
      }catch(e){rem=0;}
    }
    if(gen.length>0){
      const key=`${ramo.id}__${tema}__${type}`;
      cache[key]=[...(cache[key]||[]),...gen].slice(-PER_TEMA*2);
      await db.set(CACHE_KEY,cache);
      if(!cacheMeta[tema]) cacheMeta[tema]={};
      cacheMeta[tema][type]=(cacheMeta[tema][type]||0)+gen.length;
      await db.set(META_KEY,cacheMeta);
    }
  }
  dlRunning=false; dlCurrent='';
  render();
}

async function loadQuestion(){
  loadingG=true; questionG=null; answeredG=false;
  selectedG=null; fillValG=''; calcValG=''; showHintG=false;
  setKoke('think',rnd(KMSGS.think));
  render();
  // Try cache first (offline or if available)
  const cached=getFromCache(curRamo.id,curTema,actType);
  if(cached&&(!onlineStatus||Math.random()<0.3)){
    // Use cached 30% of time even online for variety
    questionG={...cached,type:actType};
    if(!onlineStatus){S.offlineSessions=(S.offlineSessions||0)+1;setKoke('offline',rnd(KMSGS.offline));}
    else setKoke('think','¿Sabes la respuesta? 🤔');
    loadingG=false; render(); return;
  }
  if(!onlineStatus){
    if(cached){questionG={...cached,type:actType};loadingG=false;setKoke('offline',rnd(KMSGS.offline));render();return;}
    questionG={type:actType,question:'Sin conexión y sin ejercicios guardados.',options:['Conectarse a WiFi','—','—','—'],correct:0,hint:'Descarga ejercicios cuando tengas WiFi.',explanation:'',problem:'Sin conexión',answer:'',unit:'',before:'Sin',blank:'conexión',after:'.'};
    loadingG=false; render(); return;
  }
  try{
    const q=await genBatch(curRamo.id,curTema,actType,1);
    questionG={...(Array.isArray(q)?q[0]:q),type:actType};
    setKoke('think','¿Sabes la respuesta? 🤔');
  }catch(e){
    if(cached){questionG={...cached,type:actType};}
    else{questionG={type:actType,question:'Error de conexión.',options:['Reintentar','—','—','—'],correct:0,hint:'Verifica tu conexión.',explanation:'',problem:'Error',answer:'',unit:'',before:'Error',blank:'cargando',after:''};}
  }
  loadingG=false; render();
}

function handleAnswer(isCorrect){
  if(answeredG) return;
  answeredG=true;
  const xpGain=actType==='calculo'?25:actType==='quiz'?20:15;
  addXP(xpGain,isCorrect,curRamo?.id,curTema,questionG);
  sessionQ++;
  if(isCorrect) sessionC++;
  else{sessionErr.push({...questionG,tema:curTema});if(!showHintG) showHintG=true;}
  render();
}

// ── EXAMEN ────────────────────────────────────────────────────────
function startExamen(){
  examQs=[]; examAns={}; examDone=false; examScore=null; examTimer=600;
  if(examInterval) clearInterval(examInterval);
  loadingG=true; render();
  genBatch(curRamo.id,curTema,'examen',5).then(qs=>{
    examQs=Array.isArray(qs)?qs:[];
    loadingG=false;
    examInterval=setInterval(()=>{
      examTimer--;
      if(examTimer<=0){clearInterval(examInterval);submitExamen();}
      else render();
    },1000);
    render();
  }).catch(()=>{loadingG=false;examQs=[];render();});
}

function submitExamen(){
  clearInterval(examInterval);
  let c=0;
  examQs.forEach((q,i)=>{if(examAns[i]===q.correct)c++;});
  const pct=examQs.length>0?Math.round((c/examQs.length)*100):0;
  const nota=Math.round((pct/100)*7*10)/10;
  examScore={c,total:examQs.length,pct,nota};
  examDone=true;
  S.exams=(S.exams||0)+1; checkBadges(); saveStats();
  setKoke(nota>=4?'happy':'sad',nota>=4?'¡Buen examen! 📋':'Repasa lo que falló 💪');
  goScreen('exres');
}

function renderExamen(){
  const mins=Math.floor(examTimer/60);

  if(loadingG) return `<div style="text-align:center;padding:80px 20px">
    <div style="font-size:38px;margin-bottom:14px;animation:spin 1s linear infinite;display:inline-block">📋</div>
    <div style="font-size:15px;font-weight:600">Generando examen con IA...</div></div>`;

  return `<div style="background:#fff;border-bottom:1px solid #e8e8e4;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:20">

    <div style="font-size:13px;font-weight:700;color:#BA7517">⭐${S.xp}</div>
  </div>
  <div class="main">
    <div style="font-size:13px;color:#777;margin-bottom:14px">${curTema} · ${examQs.length} preguntas · Elige la mejor opción</div>
    ${examQs.map((q,i)=>`
      <div style="background:#fff;border:1px solid #e8e8e4;border-radius:14px;padding:14px;margin-bottom:12px">
        <div style="font-size:12px;font-weight:700;color:#999;margin-bottom:6px">Pregunta ${i+1}</div>

        style="flex:1;padding:10px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;font-family:inherit;outline:none"

async function sendChat(){
  const inp=document.getElementById('chat-input');
  if(!inp||!inp.value.trim()||loadingG) return;
  const msg=inp.value.trim(); inp.value='';
  if(!onlineStatus){
    chatHistory=[...chatHistory,{role:'user',txt:msg},{role:'assistant',txt:'Sin internet ahora 😅 El chat IA necesita conexión. Tus ejercicios guardados están disponibles offline 📦'}];
    await db.set(CHAT_KEY,chatHistory); render(); return;
  }
  chatHistory=[...chatHistory,{role:'user',txt:msg}];
  loadingG=true; render();
  setKoke('think',rnd(KMSGS.explain));
  try{
    const resp=await chatClaude(msg,chatHistory);
    chatHistory=[...chatHistory,{role:'assistant',txt:resp}];
    S.chats=(S.chats||0)+1; checkBadges(); saveStats();
    setKoke('happy',rnd(KMSGS.explain));
  }catch(e){
    chatHistory=[...chatHistory,{role:'assistant',txt:'Sin conexión 😅 Verifica internet.'}];
  }
  await db.set(CHAT_KEY,chatHistory);
  loadingG=false; render();
  setTimeout(()=>{ const el=document.getElementById('chat-msgs'); if(el) el.scrollTop=el.scrollHeight; },100);
}

        ${[2,4,8,14,22].map((sz,i)=>`<button id="sz-${i}" onclick="pizSetSize(${i})" style="width:${26+i*3}px;height:${26+i*3}px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;border:2px solid ${i===2?'#1D9E75':'#ddd'};background:${i===2?'#E1F5EE':'#f5f5f5'}">
          <div style="width:${Math.min(sz,16)}px;height:${Math.min(sz,16)}px;border-radius:50%;background:${i===2?'#1D9E75':'#1a1a1a'}"></div>
        </button>`).join('')}
      </div>
      <div style="width:1px;height:32px;background:#e8e8e4"></div>
      <div style="display:flex;gap:4px;flex-wrap:wrap">
        ${['#1a1a1a','#E24B4A','#1D9E75','#378ADD','#EF9F27','#7F77DD','#ffffff'].map(c=>`
          <button id="col-${c.replace('#','')}" onclick="pizSetColor('${c}')" style="width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid ${c==='#1a1a1a'?'#1D9E75':'transparent'};background:${c};box-shadow:0 0 0 1px ${c==='#ffffff'?'#ccc':'transparent'}"></button>`).join('')}
      </div>
      <div style="width:1px;height:32px;background:#e8e8e4"></div>
      <div style="display:flex;gap:4px">
        <span style="font-size:11px;color:#999;font-weight:600;align-self:center">Fondo</span>
        ${[['#FFFEF5','#ddd'],['#ffffff','#e0e0e0'],['#1a1a2e','#444']].map(([bg,bd])=>`<button onclick="pizSetBg('${bg}')" style="width:24px;height:24px;border-radius:6px;cursor:pointer;background:${bg};border:2.5px solid ${bg==='#FFFEF5'?'#1D9E75':bd}"></button>`).join('')}
      </div>
      <div style="width:1px;height:32px;background:#e8e8e4"></div>
      <button onclick="pizUndo()" style="display:flex;flex-direction:column;align-items:center;gap:1px;padding:5px 7px;border-radius:10px;border:none;cursor:pointer;min-width:40px;font-size:10px;font-weight:600;background:#f0f0ec;color:#333"><span style="font-size:18px;line-height:1">↩️</span>Deshacer</button>
      <button onclick="pizClear()" style="display:flex;flex-direction:column;align-items:center;gap:1px;padding:5px 7px;border-radius:10px;border:none;cursor:pointer;min-width:40px;font-size:10px;font-weight:600;background:#fff;color:#E24B4A"><span style="font-size:18px;line-height:1">🗑️</span>Limpiar</button>
    </div>
    <div id="piz-status" style="background:#fafafa;border-bottom:1px solid #e8e8e4;padding:3px 12px;display:flex;align-items:center;gap:8px;font-size:12px;color:#777;flex-shrink:0">
      <div id="piz-dot" style="width:8px;height:8px;border-radius:50%;background:#1a1a1a;flex-shrink:0"></div>
      <span id="piz-tool-lbl" style="font-weight:600;color:#444">Lápiz libre</span>
      <span style="margin-left:auto;color:#aaa">Lápiz digital · mouse · dedo ✏️</span>
    </div>
    <div id="piz-wrap" style="flex:1;position:relative;overflow:hidden">
      <div id="piz-grid" style="position:absolute;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(0,0,0,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.07) 1px,transparent 1px);background-size:40px 40px"></div>

      <div id="piz-hint" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:2;opacity:.3">
        <div style="font-size:48px;margin-bottom:8px">✏️</div>
        <div style="font-size:15px;font-weight:700;color:#333">Pizarra lista</div>
        <div style="font-size:12px;color:#666;margin-top:4px">Usa tu lápiz digital, mouse o dedo</div>
      </div>
    </div>
    <div style="background:#fff;border-top:1px solid #e8e8e4;padding:8px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0">
      <span style="font-size:12px;color:#aaa;font-weight:600">📐 Pizarra · SalónEstudio</span>
      <div style="display:flex;gap:8px">
        <button onclick="pizUndo()" style="padding:7px 14px;border-radius:8px;border:1px solid #ddd;background:#f5f5f5;font-size:13px;cursor:pointer;font-weight:600">↩ Deshacer</button>
        <button onclick="pizClear()" style="padding:7px 14px;border-radius:8px;border:1px solid #fcc;background:#FCEBEB;color:#E24B4A;font-size:13px;cursor:pointer;font-weight:600">🗑 Limpiar</button>
      </div>
    </div>
  </div>`;
}

// ── PIZARRA LOGIC (runs after render) ────────────────────────────
const PIZ = {
  tool:'pen', color:'#1a1a1a', sizeIdx:2, bg:'#FFFEF5',
  drawing:false, lastPt:null, startPt:null, snap:null, hist:[],
  sizes:[2,4,8,14,22],
};

function bindPizarra(){
  const cv=document.getElementById('piz-canvas');
  const wrap=document.getElementById('piz-wrap');
  if(!cv||!wrap) return;

  const init=()=>{
    const w=wrap.clientWidth,h=wrap.clientHeight;
    const tmp=PIZ.hist.length>0?cv.toDataURL():null;
    cv.width=w;cv.height=h;
    const ctx=cv.getContext('2d');
    ctx.fillStyle=PIZ.bg;ctx.fillRect(0,0,w,h);
    if(tmp){const img=new Image();img.onload=()=>ctx.drawImage(img,0,0);img.src=tmp;}
    const hint=document.getElementById('piz-hint');
    if(hint) hint.style.display=PIZ.hist.length===0?'block':'none';
  };
  init();
  if(wrap._ro) wrap._ro.disconnect();
  wrap._ro=new ResizeObserver(init);
  wrap._ro.observe(wrap);

  const getCtx=()=>cv.getContext('2d');
  const getPt=e=>{
    const rect=cv.getBoundingClientRect();
    const sx=cv.width/rect.width,sy=cv.height/rect.height;
    const src=e.touches?e.touches[0]:e;
    return{x:(src.clientX-rect.left)*sx,y:(src.clientY-rect.top)*sy};
  };
  const push=()=>{PIZ.hist=[...PIZ.hist.slice(-25),cv.toDataURL()];const h=document.getElementById('piz-hint');if(h)h.style.display='none';};
  window.pizUndo=()=>{
    if(!PIZ.hist.length)return;
    const prev=PIZ.hist[PIZ.hist.length-1];PIZ.hist=PIZ.hist.slice(0,-1);
    const c=getCtx();const img=new Image();img.onload=()=>{c.clearRect(0,0,cv.width,cv.height);c.drawImage(img,0,0);};img.src=prev;
  };
  window.pizClear=()=>{push();const c=getCtx();c.fillStyle=PIZ.bg;c.fillRect(0,0,cv.width,cv.height);};
  window.pizSetTool=t=>{
    PIZ.tool=t;
    ['pen','line','eraser'].forEach(id=>{
      const b=document.getElementById('tb-'+id);
      if(b){b.style.background=id===t?'#1D9E75':'#f0f0ec';b.style.color=id===t?'#fff':'#333';}
    });
    const lbl=document.getElementById('piz-tool-lbl');
    if(lbl) lbl.textContent=t==='pen'?'Lápiz libre':t==='line'?'Línea recta':'Goma de borrar';
    cv.style.cursor=t==='eraser'?'cell':'crosshair';
  };
  window.pizSetSize=i=>{
    PIZ.sizeIdx=i;
    [0,1,2,3,4].forEach(j=>{
      const b=document.getElementById('sz-'+j);
      if(b){b.style.borderColor=j===i?'#1D9E75':'#ddd';b.style.background=j===i?'#E1F5EE':'#f5f5f5';b.firstElementChild.style.background=j===i?'#1D9E75':'#1a1a1a';}
    });
    const dot=document.getElementById('piz-dot');
    if(dot){dot.style.width=Math.min(PIZ.sizes[i],16)+'px';dot.style.height=Math.min(PIZ.sizes[i],16)+'px';dot.style.background=PIZ.color;}
  };
  window.pizSetColor=c=>{
    PIZ.color=c;if(PIZ.tool==='eraser')window.pizSetTool('pen');
    ['#1a1a1a','#E24B4A','#1D9E75','#378ADD','#EF9F27','#7F77DD','#ffffff'].forEach(col=>{
      const b=document.getElementById('col-'+col.replace('#',''));
      if(b) b.style.borderColor=col===c?'#1D9E75':'transparent';
    });
    const dot=document.getElementById('piz-dot');if(dot)dot.style.background=c;
  };
  window.pizSetBg=newBg=>{
    push();const c_=getCtx();
    const tmp=cv.toDataURL();
    c_.fillStyle=newBg;c_.fillRect(0,0,cv.width,cv.height);
    const img=new Image();img.onload=()=>c_.drawImage(img,0,0);img.src=tmp;
    PIZ.bg=newBg;
    const grid=document.getElementById('piz-grid');
    if(grid) grid.style.display=newBg==='#FFFEF5'?'block':'none';
    const status=document.getElementById('piz-status');
    if(status){status.style.background=newBg==='#1a1a2e'?'#111':'#fafafa';}
  };

  const down=e=>{
    e.preventDefault();push();PIZ.drawing=true;
    const p=getPt(e);PIZ.lastPt=p;PIZ.startPt=p;
    if(PIZ.tool==='line'){PIZ.snap=cv.toDataURL();return;}
    const c_=getCtx();const sw=PIZ.tool==='eraser'?PIZ.sizes[PIZ.sizeIdx]*2.5:PIZ.sizes[PIZ.sizeIdx];
    c_.beginPath();c_.arc(p.x,p.y,sw/2,0,Math.PI*2);c_.fillStyle=PIZ.tool==='eraser'?PIZ.bg:PIZ.color;c_.fill();
    c_.beginPath();c_.moveTo(p.x,p.y);
  };
  const move=e=>{
    if(!PIZ.drawing)return;e.preventDefault();
    const p=getPt(e);const c_=getCtx();
    const sw=PIZ.tool==='eraser'?PIZ.sizes[PIZ.sizeIdx]*2.5:PIZ.sizes[PIZ.sizeIdx];
    if(PIZ.tool==='line'){
      const img=new Image();img.onload=()=>{
        c_.clearRect(0,0,cv.width,cv.height);c_.drawImage(img,0,0);
        c_.beginPath();c_.moveTo(PIZ.startPt.x,PIZ.startPt.y);c_.lineTo(p.x,p.y);
        c_.strokeStyle=PIZ.color;c_.lineWidth=PIZ.sizes[PIZ.sizeIdx];c_.lineCap='round';c_.stroke();
      };img.src=PIZ.snap;PIZ.lastPt=p;return;
    }
    c_.beginPath();c_.moveTo(PIZ.lastPt.x,PIZ.lastPt.y);c_.lineTo(p.x,p.y);
    c_.strokeStyle=PIZ.tool==='eraser'?PIZ.bg:PIZ.color;c_.lineWidth=sw;c_.lineCap='round';c_.lineJoin='round';c_.stroke();
    PIZ.lastPt=p;
  };
  const up=e=>{if(!PIZ.drawing)return;e.preventDefault();PIZ.drawing=false;};
  cv.addEventListener('mousedown',down);cv.addEventListener('mousemove',move);cv.addEventListener('mouseup',up);cv.addEventListener('mouseleave',up);
  cv.addEventListener('touchstart',down,{passive:false});cv.addEventListener('touchmove',move,{passive:false});cv.addEventListener('touchend',up);cv.addEventListener('touchcancel',up);
}

// ── BIND ALL ──────────────────────────────────────────────────────
function bindAll(){
  if(S.screen==='pizarra') bindPizarra();
  if(S.screen==='practice'){
    const fi=document.getElementById('fill-in');
    if(fi) fi.addEventListener('keydown',e=>{if(e.key==='Enter'&&!answeredG){fillValG=fi.value;handleAnswer(fillValG.trim().toLowerCase()===(questionG?.blank||'').toLowerCase());}});
    const ci=document.getElementById('calc-in');
    if(ci) ci.addEventListener('keydown',e=>{if(e.key==='Enter'&&!answeredG){calcValG=ci.value;handleAnswer(calcValG.trim().toLowerCase()===(questionG?.answer||'').toLowerCase());}});
  }
  if(S.screen==='explicame'){
    const inp=document.getElementById('chat-input');
    if(inp) inp.addEventListener('keydown',e=>{if(e.key==='Enter')sendChat();});
    setTimeout(()=>{const el=document.getElementById('chat-msgs');if(el)el.scrollTop=el.scrollHeight;},80);
  }
}

init();
</script>
